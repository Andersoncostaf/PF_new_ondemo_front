<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.08"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#ffffff" stroke-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <ellipse cx="920" cy="120" rx="280" ry="200" fill="url(#glow)"/>
  <ellipse cx="180" cy="780" rx="220" ry="160" fill="#3b82f6" fill-opacity="0.12"/>

  <!-- warehouse / supply abstract -->
  <g stroke="#94a3b8" stroke-opacity="0.35" stroke-width="2">
    <rect x="120" y="420" width="200" height="140" rx="8"/>
    <rect x="340" y="380" width="240" height="180" rx="8"/>
    <rect x="600" y="440" width="180" height="120" rx="8"/>
    <path d="M320 490h40M560 450h40M780 500h40"/>
  </g>
  <g fill="#22c55e" fill-opacity="0.85">
    <circle cx="220" cy="490" r="10"/>
    <circle cx="460" cy="470" r="10"/>
    <circle cx="690" cy="500" r="10"/>
    <circle cx="860" cy="460" r="10"/>
  </g>
  <g stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.7">
    <path d="M230 490 L450 470 L700 500 L850 460"/>
    <path d="M460 470 L460 350 L620 320"/>
    <path d="M690 500 L690 620 L820 650"/>
  </g>

  <!-- boxes / pallets -->
  <g fill="#3b82f6" fill-opacity="0.25" stroke="#60a5fa" stroke-opacity="0.5">
    <rect x="880" y="520" width="72" height="52" rx="6"/>
    <rect x="960" y="540" width="72" height="52" rx="6"/>
    <rect x="920" y="468" width="72" height="52" rx="6"/>
  </g>

  <!-- document / invoice hint -->
  <g transform="translate(980 280)">
    <rect width="96" height="120" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
    <line x1="20" y1="36" x2="76" y2="36" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="56" x2="68" y2="56" stroke="#ffffff" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="72" x2="60" y2="72" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>

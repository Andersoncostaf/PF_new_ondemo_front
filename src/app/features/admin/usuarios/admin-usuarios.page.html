<p-card header="Usuários da empresa">
  @if (errorMessage) {
    <p-message severity="error" [text]="errorMessage" styleClass="mb-3 w-full" />
  }
  @if (successMessage) {
    <p-message severity="success" [text]="successMessage" styleClass="mb-3 w-full" />
  }

  <div class="toolbar">
    <p-button label="Convidar colaborador" icon="pi pi-user-plus" (onClick)="abrirNovo()" />
  </div>

  <p-table [value]="colaboradores" [loading]="loading" styleClass="p-datatable-gridlines">
    <ng-template pTemplate="header">
      <tr>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Perfil</th>
        <th>Cargo</th>
        <th>Status</th>
        <th style="width: 6rem">Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>{{ item.nome }}</td>
        <td>{{ item.email }}</td>
        <td>{{ perfilLabel(item.perfil) }}</td>
        <td>{{ item.cargo || '—' }}</td>
        <td>
          <p-tag [value]="item.status === 'ativo' ? 'Ativo' : item.status" [severity]="item.status === 'ativo' ? 'success' : 'secondary'" />
        </td>
        <td>
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="abrirEditar(item)" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6">Nenhum colaborador cadastrado.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<p-dialog
  [header]="editando ? 'Editar colaborador' : 'Convidar colaborador'"
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '32rem' }"
  [draggable]="false"
>
  <form [formGroup]="form" class="dialog-form" (ngSubmit)="salvar()">
    <label>Nome</label>
    <input pInputText formControlName="nome" class="w-full" />

    <label>E-mail</label>
    <input pInputText formControlName="email" type="email" class="w-full" [readonly]="!!editando" />

    @if (!editando) {
      <label>Senha temporária</label>
      <p-password formControlName="password" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
    }

    <label>Perfil</label>
    <p-dropdown formControlName="perfil" [options]="perfis" optionLabel="label" optionValue="value" styleClass="w-full" />

    <label>Cargo</label>
    <input pInputText formControlName="cargo" class="w-full" />

    @if (editando) {
      <label>Status</label>
      <p-dropdown
        formControlName="status"
        [options]="[
          { label: 'Ativo', value: 'ativo' },
          { label: 'Inativo', value: 'inativo' },
        ]"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full"
      />
    }
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="dialogVisible = false" />
    <p-button label="Salvar" icon="pi pi-check" [loading]="saving" (onClick)="salvar()" />
  </ng-template>
</p-dialog>

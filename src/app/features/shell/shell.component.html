<div class="shell">
  <header class="shell-header">
    <div class="brand">
      <span class="brand-title">Portal Fornecedor</span>
      <span class="brand-subtitle">{{ tenantNome }}</span>
    </div>

    <nav class="shell-nav">
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Início
      </a>

      @for (modulo of modulos$ | async; track modulo.codigo) {
        <a [routerLink]="modulo.rota" routerLinkActive="active">{{ modulo.label }}</a>
      }
    </nav>

    <div class="shell-actions">
      <span class="user-name">{{ usuarioNome }}</span>
      <p-button label="Sair" severity="secondary" (onClick)="logout()" />
    </div>
  </header>

  <main class="shell-content">
    <router-outlet />
  </main>
</div>

<div class="shell">
  @if (sidebarOpen()) {
    <div
      class="sidebar-backdrop"
      aria-hidden="true"
      (click)="closeSidebar()"
    ></div>
  }

  <aside class="sidebar" [class.sidebar--open]="sidebarOpen()">
    <div class="sidebar-brand">
      <span class="brand-title">Portal Fornecedor</span>
      <span class="brand-subtitle">{{ tenantNome }}</span>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
        (click)="closeSidebarOnNavigate()"
      >
        <i [class]="homeIcon" aria-hidden="true"></i>
        <span class="nav-label">Início</span>
      </a>

      @for (modulo of modulos$ | async; track modulo.codigo) {
        <a
          [routerLink]="modulo.rota"
          routerLinkActive="active"
          class="nav-item"
          (click)="closeSidebarOnNavigate()"
        >
          <i [class]="moduloIcon(modulo.codigo)" aria-hidden="true"></i>
          <span class="nav-label">{{ modulo.label }}</span>
          @if (moduloBadge(modulo.codigo); as count) {
            <span class="nav-badge">{{ count }}</span>
          }
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <span class="user-name">{{ usuarioNome }}</span>
      <p-button
        label="Sair"
        icon="pi pi-sign-out"
        severity="secondary"
        [text]="true"
        styleClass="logout-btn"
        (onClick)="logout()"
      />
    </div>
  </aside>

  <div class="shell-main">
    <header class="shell-topbar-mobile">
      <p-button
        icon="pi pi-bars"
        [text]="true"
        severity="secondary"
        ariaLabel="Abrir menu"
        (onClick)="toggleSidebar()"
      />
      <span class="topbar-title">{{ tenantNome }}</span>
    </header>

    <main class="shell-content">
      <router-outlet />
    </main>
  </div>
</div>

<p-card header="Contratação de Serviços">
  @if (errorMessage) {
    <p-message severity="error" [text]="errorMessage" styleClass="mb-3 w-full" />
  }

  <div class="lista-actions">
    <p-button label="Nova solicitação" icon="pi pi-plus" (onClick)="nova()" />
  </div>

  <p-table
    [value]="contratacoes"
    [loading]="loading"
    [rows]="10"
    styleClass="p-datatable-sm mt-3"
    [tableStyle]="{ 'min-width': '40rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Título</th>
        <th>Categoria</th>
        <th>Status</th>
        <th>Criado em</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>{{ item.titulo || '(sem título)' }}</td>
        <td>{{ item.categoria_servico || '—' }}</td>
        <td>
          <p-tag [value]="statusLabel(item.status)" [severity]="statusSeverity(item.status)" />
        </td>
        <td>{{ item.created_at | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <p-button
            label="Abrir"
            [text]="true"
            size="small"
            (onClick)="abrir(item)"
          />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5">Nenhuma solicitação cadastrada. Clique em Nova solicitação.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
